name: Dependency Submission

on:
  push:
    branches:
      - main
    paths:
      - 'gradle/libs.versions.toml'
      - '**.gradle'
      - '**.gradle.kts'
      - 'buildSrc/**'
      - '.github/workflows/dependency-submission.yml'
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Submit Dependencies
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          # Resolving root, core, and two major extensions captures all shared dependencies.
          # This fixes the task error and prevents the 1h30m timeout from 1,300+ extensions.
          additional-arguments: |
            :dependencies
            :core:dependencies
            :src:all:mangadex:dependencies
            :src:all:webtoons:dependencies
